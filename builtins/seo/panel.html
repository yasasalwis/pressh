<style>
  :root { color-scheme: light dark; }
  body { font: 14px/1.5 system-ui, sans-serif; margin: 0; padding: 16px; color: #1f2937; background: #fff; }
  @media (prefers-color-scheme: dark) { body { color: #e5e7eb; background: #0b1220; } th,td { border-color:#1f2a44 !important; } input,textarea { background:#0b1220; color:#e5e7eb; border-color:#1f2a44; } }
  h2 { font-size: 16px; margin: 0 0 4px; }
  h3 { font-size: 14px; margin: 0 0 8px; }
  .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: #6b7280; margin: 8px 0 2px; }
  input, textarea { width: 100%; box-sizing: border-box; font: inherit; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 6px; color: inherit; background: #fff; }
  button { font: inherit; padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; background: #f8fafc; color: inherit; cursor: pointer; }
  button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  button.danger { color: #dc2626; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #e5e7eb; }
  .muted { color: #6b7280; } .err { color: #dc2626; }
</style>

<h2>SEO</h2>
<p class="muted">Defaults apply site-wide; per-page entries override them by slug.</p>

<div class="card">
  <h3>Site defaults</h3>
  <label>Meta description</label><textarea id="d_description" rows="2"></textarea>
  <label>OpenGraph title</label><input id="d_ogTitle">
  <label>OpenGraph description</label><textarea id="d_ogDescription" rows="2"></textarea>
  <label>OpenGraph image URL (http(s) or /relative only)</label><input id="d_ogImage">
  <label>Robots (e.g. index,follow)</label><input id="d_robots">
  <div class="row" style="margin-top:10px"><button class="primary" onclick="saveDefaults()">Save defaults</button><span id="dmsg" class="muted"></span></div>
</div>

<div class="card">
  <h3>Per-page override</h3>
  <label>Page slug (e.g. about)</label><input id="o_slug">
  <label>Meta description</label><textarea id="o_description" rows="2"></textarea>
  <label>OpenGraph title</label><input id="o_ogTitle">
  <label>OpenGraph description</label><textarea id="o_ogDescription" rows="2"></textarea>
  <label>OpenGraph image URL</label><input id="o_ogImage">
  <label>Robots</label><input id="o_robots">
  <div class="row" style="margin-top:10px"><button class="primary" onclick="saveOverride()">Save override</button><button onclick="clearOverride()">Clear</button><span id="omsg" class="muted"></span></div>
</div>

<div id="list"></div>

<script>
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function getMeta(p){ return { description:$(p+"description").value, ogTitle:$(p+"ogTitle").value, ogDescription:$(p+"ogDescription").value, ogImage:$(p+"ogImage").value, robots:$(p+"robots").value }; }
  function setMeta(p,m){ m=m||{}; $(p+"description").value=m.description||""; $(p+"ogTitle").value=m.ogTitle||""; $(p+"ogDescription").value=m.ogDescription||""; $(p+"ogImage").value=m.ogImage||""; $(p+"robots").value=m.robots||""; }
  function clearOverride(){ $("o_slug").value=""; setMeta("o_",{}); $("omsg").textContent=""; }

  async function saveDefaults(){
    try { await window.presshPanel.request("saveDefaults",{ meta:getMeta("d_") }); $("dmsg").textContent="Saved."; }
    catch(e){ $("dmsg").textContent=e.message; $("dmsg").className="err"; }
  }
  async function saveOverride(){
    var slug=$("o_slug").value.trim();
    if(!slug){ $("omsg").textContent="Enter a slug."; $("omsg").className="err"; return; }
    try { await window.presshPanel.request("saveOverride",{ slug:slug, meta:getMeta("o_") }); $("omsg").textContent="Saved."; $("omsg").className="muted"; await load(); }
    catch(e){ $("omsg").textContent=e.message; $("omsg").className="err"; }
  }
  async function editOverride(o){ $("o_slug").value=o.slug; setMeta("o_",o); window.scrollTo(0,document.body.scrollHeight); }
  async function delOverride(slug){
    if(!confirm("Remove override for "+slug+"?")) return;
    try { await window.presshPanel.request("removeOverride",{ slug:slug }); await load(); } catch(e){ alert(e.message); }
  }

  async function load(){
    try {
      var r = await window.presshPanel.request("getAll");
      setMeta("d_", r.defaults);
      var ov = r.overrides || [];
      var box = $("list");
      box.innerHTML = '<div class="card"><h3>Page overrides</h3>' + (ov.length
        ? '<table><thead><tr><th>Slug</th><th>Description</th><th></th></tr></thead><tbody>' +
          ov.map(function(o){
            return "<tr><td><b>"+esc(o.slug)+"</b></td><td>"+esc(o.description)+'</td><td class="row">' +
              "<button onclick='editOverride("+JSON.stringify(o).replace(/'/g,"&#39;")+")'>Edit</button>" +
              '<button class="danger" onclick="delOverride(\''+esc(o.slug)+'\')">Remove</button></td></tr>';
          }).join("") + "</tbody></table>"
        : '<p class="muted">No per-page overrides yet.</p>') + "</div>";
    } catch(e){ $("list").innerHTML = '<p class="err">Could not load SEO settings: '+esc(e.message)+"</p>"; }
  }
  load();
</script>
