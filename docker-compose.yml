# Single-host deployment of the two-process trust split (ADR-002).
# `studio` (admin) is reachable only on the internal network here; front it with
# a reverse proxy + IP allowlist in production (see RUNBOOK).
#
# `restart: unless-stopped` is REQUIRED for the Database Manager: switching the
# storage backend writes /data/storage.json and each process exits cleanly so the
# supervisor restarts it on the new database. Both processes share /data, so they
# read the same storage.json + vault and both cut over.
services:
  site:
    build: .
    command: [ "node", "/app/site/server.js" ]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PRESSH_CONTENT_ROOT: /data/content
      PRESSH_WORKER_SCRIPT: /app/site/runtime/worker-entry.js
      # PRESSH_MASTER_KEY / PRESSH_CSRF_SECRET are auto-provisioned on first boot
      # by the entrypoint and persisted under the shared /data volume, so the Site
      # and Studio automatically use the same key (the Site reads sealed database
      # credentials from the shared vault after a Database-Manager cutover).
      # To manage the key yourself, set PRESSH_MASTER_KEY here (or via a Docker
      # secret) on BOTH services and it overrides the generated one.
    volumes:
      - pressh-data:/data
    ports:
      - "3000:3000"
    # Each probe forks a fresh Node (~40 MB transient). On a 512 MB box keep that
    # infrequent: 60s interval + a start grace period rather than every 30s. The
    # probe inherits the image's capped NODE_OPTIONS so its heap stays small too.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

  studio:
    build: .
    command: [ "node", "/app/studio/server.js" ]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PRESSH_CONTENT_ROOT: /data/content
      PRESSH_MEDIA_ROOT: /data/media
      PRESSH_WORKER_SCRIPT: /app/studio/runtime/worker-entry.js
      # Auto-provisioned on first boot and persisted under /data (shared with the
      # Site). Override by setting PRESSH_MASTER_KEY / PRESSH_CSRF_SECRET here.
    volumes:
      - pressh-data:/data
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pressh-data:
