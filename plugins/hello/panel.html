<!-- Plugin admin panel body. Rendered inside a sandboxed iframe (no
     same-origin access). Talks to the Studio only via window.presshPanel. -->
<h1>Hello plugin</h1>
<button id="greet">Greet</button>
<pre id="out"></pre>
<script>
  document.getElementById("greet").addEventListener("click", async () => {
    try {
      const res = await window.presshPanel.request("invoke", { method: "greet", args: { name: "panel" } });
      document.getElementById("out").textContent = JSON.stringify(res);
    } catch (e) {
      document.getElementById("out").textContent = "Error: " + e.message;
    }
  });
</script>
